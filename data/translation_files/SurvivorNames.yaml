# yaml-language-server: $schema=../../.schemas/translation_files.json

version: 1
name: SurvivorNames
description: All possible automatic character names. Used for random name generation
  of the player character or for zombies.
fileName: SurvivorNames
function: getText
patternProperties:
- pattern: ^Survivor(Name|Surname)_[A-Za-z0-9_\s\.'-]+$
